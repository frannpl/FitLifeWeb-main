spring.application.name=fitlife

# PostgreSQL Configuration
# Estas variables seran inyectadas por Docker Compose. Si se corre en Eclipse, usara localhost por defecto.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fitlife}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:rootpassword}

# Server Configuration
server.port=${PORT:8080}
 
# JPA Configuration
# Nota: update valida que el esquema exista, validate solo verifica
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
